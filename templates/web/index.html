{% extends 'base.html' %}

{% load static %}

{% block content %}

<div class="container text-center mt-5">

    <!-- Spacer -->
    <div class="py-5"></div>

    <!-- Main Title -->
    <h1 class="display-4 fw-bold">Django CRM Management</h1>

    <!-- Subtitle -->
    <h5 class="text-muted mb-4">
        Keep track of your records effectively
    </h5>

    <!-- Divider -->
    <hr class="mx-auto" style="width: 50%; border: 1px solid #333;">

    <!-- Action Buttons -->
    <div class="mt-4">
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg me-2">
                🚀 Go to Dashboard
            </a>
        {% else %}
            <a href="{% url 'register' %}" class="btn btn-outline-primary btn-lg me-2">
                📝 Register
            </a>
            <a href="{% url 'login' %}" class="btn btn-outline-success btn-lg">
                🔑 Login
            </a>
        {% endif %}
    </div>

    <!-- Footer Spacer -->
    <div class="py-5"></div>

</div>

{% endblock %}
